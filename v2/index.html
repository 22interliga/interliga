
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Interliga — Mobilidade</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <section class="screen" id="screen-splash" data-active="true">
    <div class="splash">
      <div class="splash-logo">Inter<span>liga</span></div>
      <div class="splash-tag">Mobilidade que conecta você</div>
    </div>
  </section>

  <section class="screen" id="screen-home">
    <header class="home-header">
      <div>
        <div class="home-greeting" id="home-greeting">Olá</div>
        <div class="home-subtitle">Para onde vamos hoje?</div>
      </div>
      <button class="avatar-btn" data-go="screen-profile" id="home-avatar">M</button>
    </header>

    <div class="home-map-wrap">
      <div id="map-home"></div>
    </div>

    <button class="search-bar" data-go="screen-ride">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Para onde você vai?</span>
    </button>

    <div class="card-grid">
      <button class="card-dark" data-go="screen-ride">
        <span class="card-icon card-icon--orange">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
        </span>
        <span class="card-title">Corrida</span>
        <span class="card-desc">Rápida e segura</span>
      </button>
      <button class="card-dark" data-go="screen-schedule">
        <span class="card-icon card-icon--blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </span>
        <span class="card-title">Agendar</span>
        <span class="card-desc">Para depois</span>
      </button>
    </div>

    <div class="section-label">ÚLTIMA CORRIDA</div>
    <button class="last-ride-card" data-go="screen-trips" id="last-ride-card">
      <span class="last-ride-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l8-4 8 4v14M9 9h1m4 0h1m-5 4h1m4 0h1m-5 4h1m4 0h1"/></svg>
      </span>
      <div class="last-ride-info">
        <div class="last-ride-title" id="last-ride-title">Sem corridas ainda</div>
        <div class="last-ride-sub" id="last-ride-sub">Peça sua primeira corrida!</div>
      </div>
      <div class="last-ride-price" id="last-ride-price"></div>
    </button>

    <nav class="bottom-nav">
      <button class="nav-item is-active" data-go="screen-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9M5 10v10a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1V10"/></svg>
        <span>Início</span>
      </button>
      <button class="nav-item" data-go="screen-trips">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        <span>Viagens</span>
      </button>
      <button class="nav-item" data-go="screen-ride">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
        <span>Corrida</span>
      </button>
      <button class="nav-item" data-go="screen-profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg>
        <span>Perfil</span>
      </button>
    </nav>
  </section>
