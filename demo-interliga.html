<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interliga — Demonstração</title>
<style>
:root {
  --ink: #14171F;
  --ink-soft: #2A2E3A;
  --orange: #FF6B00;
  --orange-soft: rgba(255,107,0,0.15);
  --red: #E8002D;
  --red-soft: rgba(232,0,45,0.15);
  --green: #16A34A;
  --green-soft: #EAFBF1;
  --blue: #5B6CFF;
  --blue-soft: #F0F4FF;
  --bg: #F7F8FC;
  --surface: #FFFFFF;
  --border: #ECEFF5;
  --text: #14171F;
  --text-soft: #9098A8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 60px;
}
.demo-header { text-align: center; margin-bottom: 20px; max-width: 700px; }
.demo-title { color: white; font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
.demo-title span { color: var(--orange); }
.demo-subtitle { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 4px; }

.stepper { display: flex; gap: 6px; margin: 18px 0; max-width: 500px; width: 100%; }
.stepper-dot { flex: 1; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.15); transition: background 0.3s; }
.stepper-dot.done { background: var(--orange); }
.stepper-dot.active { background: white; }

.scene-caption {
  max-width: 560px;
  text-align: center;
  color: white;
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 24px;
  min-height: 44px;
  line-height: 1.4;
  padding: 0 12px;
}
.scene-caption b { color: var(--orange); }

.controls { display: flex; gap: 10px; margin-top: 28px; }
.btn-demo {
  padding: 14px 26px;
  border-radius: 14px;
  font-weight: 700;
  font-size: 15px;
  border: none;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
.btn-demo:active { transform: scale(0.96); }
.btn-demo-primary { background: linear-gradient(90deg, var(--orange), #FF8C42); color: white; box-shadow: 0 8px 20px rgba(255,107,0,0.35); }
.btn-demo-secondary { background: rgba(255,255,255,0.08); color: white; border: 1.5px solid rgba(255,255,255,0.15); }
.btn-demo:disabled { opacity: 0.3; cursor: not-allowed; }

.phones-wrap {
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
  max-width: 800px;
}
.phone-col { display: flex; flex-direction: column; align-items: center; }
.phone-label {
  color: white;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  padding: 5px 14px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
}
.phone-label.passageiro { color: var(--orange); }
.phone-label.motorista { color: var(--blue); }

.phone-frame {
  width: 300px;
  height: 620px;
  background: var(--bg);
  border-radius: 34px;
  border: 8px solid #05060a;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  overflow: hidden;
  position: relative;
}
.phone-notch {
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 110px; height: 20px;
  background: #05060a;
  border-radius: 0 0 14px 14px;
  z-index: 20;
}
.phone-screen {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
}

.mock-header {
  background: var(--surface);
  padding: 30px 18px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.mock-greeting { font-size: 18px; font-weight: 700; color: var(--text); }
.mock-subtitle { font-size: 12px; color: var(--text-soft); margin-top: 2px; }

.mock-map {
  height: 160px;
  background: linear-gradient(135deg, #E8ECF4, #DCE3F0);
  flex-shrink: 0;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px;
}

.mock-search {
  margin: -18px 16px 0;
  position: relative; z-index: 5;
  background: var(--surface);
  border-radius: 14px;
  padding: 13px 16px;
  font-size: 13px;
  color: var(--text-soft);
  font-weight: 600;
  box-shadow: 0 8px 20px rgba(20,23,31,0.12);
}

.mock-body { flex: 1; overflow-y: auto; padding: 16px; }

.mock-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
}
.mock-driver-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 10px rgba(20,23,31,0.08);
  margin-bottom: 10px;
}
.mock-avatar {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), #7d8aff);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px;
  flex-shrink: 0;
}
.mock-driver-info { flex: 1; }
.mock-driver-name { font-size: 14px; font-weight: 800; color: var(--text); }
.mock-driver-detail { font-size: 11px; color: var(--text-soft); margin-top: 1px; }

.mock-btn-primary {
  background: linear-gradient(90deg, var(--orange), #FF8C42);
  color: white;
  font-weight: 700;
  font-size: 14px;
  padding: 14px;
  border-radius: 14px;
  text-align: center;
  margin: 8px 0;
}
.mock-btn-outline {
  border: 1.5px solid var(--border);
  color: var(--text);
  font-weight: 700;
  font-size: 13px;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  margin-top: 6px;
}

.mock-pulse {
  width: 76px; height: 76px;
  border-radius: 50%;
  background: var(--orange-soft);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin: 0 auto 14px;
  animation: mockpulse 1.4s infinite;
}
@keyframes mockpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

.mock-toast {
  position: absolute;
  top: 34px; left: 50%; transform: translateX(-50%);
  background: var(--ink);
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 9px 16px;
  border-radius: 20px;
  white-space: nowrap;
  z-index: 30;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.mock-request-card {
  background: var(--surface);
  border-radius: 18px;
  padding: 16px;
  box-shadow: 0 8px 24px rgba(20,23,31,0.14);
  border: 2px solid var(--orange);
}
.mock-request-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.mock-countdown {
  width: 30px; height: 30px; border-radius: 50%;
  border: 2.5px solid var(--orange);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: var(--orange);
}
.mock-route-line { display: flex; flex-direction: column; gap: 5px; margin: 10px 0; font-size: 12px; color: var(--text); font-weight: 600; }
.mock-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 8px; }

.mock-chat-bubble { max-width: 75%; padding: 8px 12px; border-radius: 14px; font-size: 12px; margin-bottom: 6px; }
.mock-chat-me { background: var(--orange); color: white; border-radius: 14px 14px 4px 14px; margin-left: auto; }
.mock-chat-them { background: white; color: var(--text); border-radius: 14px 14px 14px 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }

.mock-online-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--green-soft); color: var(--green);
  font-size: 11px; font-weight: 800;
  padding: 5px 12px; border-radius: 20px;
}
.mock-star-row { display: flex; gap: 6px; justify-content: center; font-size: 26px; margin: 14px 0; }

.mock-earnings-box {
  background: linear-gradient(135deg, var(--orange), #FF8C42);
  border-radius: 16px;
  padding: 18px;
  text-align: center;
  color: white;
  margin-top: 14px;
}
.mock-earnings-val { font-size: 26px; font-weight: 800; margin-top: 4px; }

@media (max-width: 680px) {
  .phones-wrap { gap: 40px; }
  .phone-frame { width: 260px; height: 540px; }
}
</style>
</head>
<body>

<div class="demo-header">
  <div class="demo-title">🚗 <span>Interliga</span> — Demonstração</div>
  <div class="demo-subtitle">Veja o app do passageiro e do motorista lado a lado, em tempo real</div>
</div>

<div class="stepper" id="stepper"></div>
<div class="scene-caption" id="caption"></div>

<div class="phones-wrap">
  <div class="phone-col">
    <div class="phone-label passageiro">📱 PASSAGEIRO</div>
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div id="pax-screens"></div>
    </div>
  </div>
  <div class="phone-col">
    <div class="phone-label motorista">🚕 MOTORISTA</div>
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div id="mot-screens"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn-demo btn-demo-secondary" id="btn-voltar">◀ Voltar</button>
  <button class="btn-demo btn-demo-primary" id="btn-avancar">Próximo passo →</button>
</div>

<script>

    mot: `

          <div class="mock-card"><b style="font-size:13px;">🚗 Interliga X</b><div style="display:flex;justify-content:space-between;margin-top:4px;"><span style="font-size:11px;color:var(--text-soft);">4 min</span><b style="color:var(--orange);">R$ 18,50</b></div></div>

    mot: `

        Buscando corridas por perto...<br>

  },
  {
    legenda: 'A <b>passageira</b> confirma o pedido. A tela mostra "Buscando motorista..." enquanto o sistema encontra alguém disponível.',

    mot: `

      </div>

      <div class="mock-body" style="text-align:center;color:var(--text-soft);font-size:13px;padding-top:20px;">
        Buscando corridas por perto...
      </div>`,

  {
    legenda: 'O <b>motorista</b> recebe a oferta com <b>15 segundos</b> pra decidir — origem, destino, valor e dados da passageira.',
    pax: `
      <div class="mock-body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;">
        <div class="mock-pulse">🔍</div>
        <div style="font-weight:800;font-size:16px;">Buscando motorista...</div>
      </div>`,
    mot: `

            <div style="display:flex;align-items:center;gap:8px;">

            </div>

          </div>

        </div>
      </div>`,
  },
  {
    legenda: 'O <b>motorista aceita</b>. Agora os dois lados veem os dados um do outro — a <b>passageira</b> vê quem está a caminho.',
    pax: `
      <div class="mock-header">
        <div class="mock-greeting" style="font-size:15px;">🚗 Motorista a caminho</div>
        <div class="mock-subtitle">Chega em 4 minutos</div>
      </div>
      <div class="mock-map">🗺️🚗</div>
      <div class="mock-body">
        <div class="mock-driver-card">
          <div class="mock-avatar">RI</div>
          <div class="mock-driver-info">
            <div class="mock-driver-name">Ricardo Santos</div>
            <div class="mock-driver-detail">⭐ 4.8 · Honda Civic Prata · ABC-1234</div>
          </div>
        </div>
        <div class="mock-btn-outline">💬 Chat · 📞 Ligar</div>
      </div>`,
    mot: `
      <div class="mock-header">
        <div class="mock-greeting" style="font-size:15px;">A caminho da passageira</div>
      </div>
      <div class="mock-map">🗺️🚗</div>
      <div class="mock-body">
        <div class="mock-driver-card">
          <div class="mock-avatar" style="background:linear-gradient(135deg,var(--orange),#ff8c42);">CA</div>
          <div class="mock-driver-info">
            <div class="mock-driver-name">Camila</div>
            <div class="mock-driver-detail">Rua das Palmeiras, 120</div>
          </div>
        </div>
        <div class="mock-btn-primary">✅ Cheguei no local</div>
      </div>`,
  },
  {
    legenda: 'Corrida em andamento — os dois acompanham o trajeto no mapa e podem trocar mensagens direto pelo chat.',
    pax: `
      <div class="mock-header">
        <div class="mock-greeting" style="font-size:15px;">🚗 Em viagem</div>
        <div class="mock-subtitle">Chegada em 9 minutos</div>
      </div>
      <div class="mock-map">🗺️🚗</div>
      <div class="mock-body" style="display:flex;flex-direction:column;">
        <div class="mock-chat-bubble mock-chat-them">Chegando aí, tudo certo?</div>
        <div class="mock-chat-bubble mock-chat-me">Perfeito, obrigada! 😊</div>
      </div>`,
    mot: `
      <div class="mock-header">
        <div class="mock-greeting" style="font-size:15px;">🚗 Em viagem</div>
        <div class="mock-subtitle">Levando Camila</div>
      </div>
      <div class="mock-map">🗺️🚗</div>
      <div class="mock-body" style="display:flex;flex-direction:column;">
        <div class="mock-chat-bubble mock-chat-me">Chegando aí, tudo certo?</div>
        <div class="mock-chat-bubble mock-chat-them">Perfeito, obrigada! 😊</div>
        <div class="mock-btn-primary" style="margin-top:auto;">🏁 Finalizar corrida</div>
      </div>`,
  },
  {
    legenda: 'O <b>motorista finaliza</b> a corrida. Na hora, os dois vão pra tela de <b>avaliação</b> — um avalia o outro.',
    pax: `
      <div class="mock-body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px;">
        <div class="mock-avatar" style="width:64px;height:64px;font-size:22px;margin-bottom:14px;background:linear-gradient(135deg,var(--blue),#7d8aff);">RI</div>
        <div style="font-weight:800;font-size:15px;">Como foi com Ricardo?</div>
        <div class="mock-star-row">⭐⭐⭐⭐⭐</div>
        <div class="mock-btn-primary" style="width:100%;">Enviar avaliação</div>
      </div>`,
    mot: `
      <div class="mock-body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px;">
        <div class="mock-avatar" style="width:64px;height:64px;font-size:22px;margin-bottom:14px;background:linear-gradient(135deg,var(--orange),#ff8c42);">CA</div>
        <div style="font-weight:800;font-size:15px;">Como foi com Camila?</div>
        <div class="mock-star-row">⭐⭐⭐⭐⭐</div>
        <div class="mock-earnings-box">
          <div style="font-size:11px;opacity:0.85;">Você ganhou</div>
          <div class="mock-earnings-val">R$ 18,50</div>
        </div>
      </div>`,
  },
  {
    legenda: 'Corrida concluída! A <b>passageira</b> pode pedir outra a qualquer momento, e o <b>motorista</b> já está pronto pra próxima oferta.',
    pax: `
      <div class="mock-header">
        <div class="mock-greeting">Olá, Camila 👋</div>
        <div class="mock-subtitle">Pra onde vamos hoje?</div>
      </div>
      <div class="mock-map">🗺️</div>
      <div class="mock-search">🔍 Para onde você vai?</div>
      <div class="mock-body">
        <div style="font-size:11px;color:var(--text-soft);font-weight:700;margin-bottom:6px;">ÚLTIMA CORRIDA</div>
        <div class="mock-card" style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:12px;">Shopping Bela Vista</span>
          <b style="color:var(--orange);font-size:13px;">R$ 18,50</b>
        </div>
      </div>`,
    mot: `
      <div class="mock-header">
        <div class="mock-greeting">Olá, Ricardo 👋</div>
        <span class="mock-online-toggle">🟢 Online</span>
      </div>
      <div class="mock-map">🗺️</div>
      <div class="mock-body">
        <div style="font-size:11px;color:var(--text-soft);font-weight:700;margin-bottom:6px;">HOJE</div>
        <div class="mock-card" style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:12px;">1 corrida concluída</span>
          <b style="color:var(--green);font-size:13px;">R$ 18,50</b>
        </div>
        <div style="text-align:center;color:var(--text-soft);font-size:12px;margin-top:20px;">Aguardando próxima oferta...</div>
      </div>`,
  },
];

let passoAtual = 0;

function montarStepper() {
  const el = document.getElementById('stepper');
  el.innerHTML = passos.map((_, i) => `<div class="stepper-dot" data-i="${i}"></div>`).join('');
}

function renderPasso() {
  const p = passos[passoAtual];
  document.getElementById('caption').innerHTML = p.legenda;
  document.getElementById('pax-screens').innerHTML = `<div class="phone-screen">${p.pax}</div>`;
  document.getElementById('mot-screens').innerHTML = `<div class="phone-screen">${p.mot}</div>`;

  document.querySelectorAll('.stepper-dot').forEach((dot, i) => {
    dot.classList.toggle('done', i < passoAtual);
    dot.classList.toggle('active', i === passoAtual);
  });

  document.getElementById('btn-voltar').disabled = passoAtual === 0;
  document.getElementById('btn-avancar').textContent = passoAtual === passos.length - 1 ? '🔁 Reiniciar demonstração' : 'Próximo passo →';
}

document.getElementById('btn-avancar').addEventListener('click', () => {
  if (passoAtual === passos.length - 1) {
    passoAtual = 0;
  } else {
    passoAtual++;
  }
  renderPasso();
});
document.getElementById('btn-voltar').addEventListener('click', () => {
  if (passoAtual > 0) passoAtual--;
  renderPasso();
});

montarStepper();
renderPasso();
</script>
</body>
</html>
